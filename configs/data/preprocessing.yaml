# =============================================================================
# configs/data/preprocessing.yaml
# =============================================================================

preprocessing:
  snv_normalization:
    enabled: true

  per_sample_mean_subtraction:
    enabled: false

  savitzky_golay:
    enabled: true
    window_length: 11
    polyorder: 3

  clip:
    enabled: true
    min_val: -3.0
    max_val:  3.0

  pipeline:
    - snv_normalization
    - savitzky_golay
    - clip

# Derivative preprocessing for the second input channel.
# This is handled separately by the dataloader, not the main pipeline.
derivative:
  enabled: true
  window_length: 11
  polyorder: 3