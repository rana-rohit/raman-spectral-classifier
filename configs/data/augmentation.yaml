  # =============================================================================
  # configs/data/augmentation.yaml
  # Applied ONLY during training. Never at validation or evaluation.
  # =============================================================================

  augmentation:
    apply_probability: 0.0
    seed: 42

    steps:
      gaussian_noise:
        enabled: false
        max_std: 0.03          # updated from 0.02 — clinical variance 25-30% higher

      baseline_shift:
        enabled: false
        max_shift: 0.08        # updated from 0.05 — covers observed MAD of 0.073

      amplitude_scale:
        enabled: false
        factor: 0.10

      spectral_shift:
        enabled: false
        max_shift: 5