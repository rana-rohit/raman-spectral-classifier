# =============================================================================
# configs/data/augmentation.yaml
# Applied only during training. Never at validation or evaluation.
# =============================================================================

augmentation:
  apply_probability: 0.8
  seed: 42
  clip_min: -3.0
  clip_max: 3.0

  steps:
    gaussian_noise:
      enabled: true
      max_std: 0.08

    baseline_shift:
      enabled: true
      max_shift: 0.15

    amplitude_scale:
      enabled: false
      factor: 0.15

    multiplicative_intensity:
      enabled: true
      factor: 0.25

    baseline_drift:
      enabled: true
      max_strength: 0.10
      n_control_points: 5

    polynomial_baseline:
      enabled: false
      max_degree: 3
      max_amplitude: 0.15

    peak_broadening:
      enabled: true
      max_sigma: 0.3

    nonlinear_warp:
      enabled: false
      max_shift: 1.5
      n_control_points: 6

    spectral_shift:
      enabled: true
      max_shift: 2

    channel_dropout:
      enabled: false
      max_width: 10
      max_drops: 1
