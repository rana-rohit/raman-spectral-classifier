model:
  name: cnn
  signal_length: 1000
  n_classes: 5
  in_channels: 2
  channels: [32, 64, 128, 256]
  kernel_sizes: [7, 15, 15, 31]
  dropout: 0.5

training:
  scheduler: warmup_cosine
  scheduler_cfg:
    warmup_epochs: 5
    total_epochs: 100
    eta_min: 0.000001

  coral:
    enabled: true
    weight: 0.1
