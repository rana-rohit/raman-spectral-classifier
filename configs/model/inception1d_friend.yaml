model:
  name: inception1d
  signal_length: 1000
  n_classes: 5
  in_channels: 1
  stem_channels: 32
  inception_channels: [64, 128, 256]
  kernel_sizes: [3, 5, 7]
  bottleneck_channels: 0
  use_residual: false
  dropout: 0.5
  fc_dim: 256

training:
  max_epochs: 30
  batch_size: 64
  optimizer: adamw
  lr: 0.001
  weight_decay: 0.0001
  scheduler: plateau
  scheduler_cfg:
    patience: 7
    factor: 0.5
  monitor_metric: accuracy
  early_stopping_patience: 7
