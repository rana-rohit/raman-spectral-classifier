model:
  name: resnet1d
  signal_length: 1000
  n_classes: 5
  channels: [32, 64, 128, 256]
  n_blocks: [2, 2, 2, 2]
  stem_kernel: 7
  dropout: 0.3
  
  # Optional Squeeze-and-Excitation (SE) attention
  use_se: false
  se_reduction: 16

  # Optional Convolutional Block Attention Module (CBAM)
  use_cbam: false
  cbam_reduction: 16
  cbam_kernel_size: 7
