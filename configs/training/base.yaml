# configs/training/base.yaml
# Shared defaults. Model-specific configs override these.

training:
  max_epochs: 20
  batch_size: 128
  num_workers: 2
  transfer_semantic_space: compact_transfer_space
  optimizer: adamw
  lr: 0.0001
  weight_decay: 0.0001

  loss: cross_entropy
  loss_kwargs: {}
  class_weights:
    enabled: true
    source: train

  scheduler: warmup_cosine
  scheduler_cfg:
    warmup_epochs: 5
    total_epochs: 20
    eta_min: 0.000001

  early_stopping_patience: 3
  monitor_metric: f1_macro
  gradient_clip: 1.0

  finetune_lr: 0.00001
  finetune_epochs: 25
  finetune_batch_size: 64
  finetune_patience: 5

  l2sp:
    enabled: false
    lambda: 0.001
    exclude_patterns: []

  consistency:
    enabled: false
    loss_weight: 0.5
    views: 2
  
  supcon:
    enabled: false
    weight: 0.05
    temperature: 0.1
  
  # Supervised Contrastive hybrid training (Stage 1 extension)
  contrastive_weight: 0.7
  classification_weight: 0.3
  temperature: 0.07
  
  target_supervised:
    enabled: true
    weight: 1.0
  
  dann:
    enabled: false
    weight: 0.0
  
  coral:
    enabled: false
    weight: 0.0
  
  freeze_bn: false

multitask:
  auxiliary_clinical_head:
    enabled: false
    sparse_global_treatment_ids: [0, 2, 3, 5, 6]
    dropout: 0.0
    loss_weight: 0.1
    clinical_blend: 0.2

pretraining:
  isolate_stage:
    enabled: true
    semantic_space: isolate_space
    n_classes: 30

  treatment_stage:
    enabled: true
    semantic_space: global_treatment_space
    n_classes: 8

  clinical_transfer_stage:
    enabled: true
    semantic_space: compact_transfer_space
    n_classes: 5