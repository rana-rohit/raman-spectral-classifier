# =============================================================================
# configs/training/base.yaml
# Shared defaults. Model-specific configs override these.
# =============================================================================

training:
  max_epochs: 100
  batch_size: 128
  num_workers: 2

  optimizer: adamw
  lr: 0.001
  weight_decay: 0.0001

  loss: cross_entropy
  loss_kwargs: {}

  scheduler: cosine
  scheduler_cfg:
    T_max: 100
    eta_min: 0.000001

  early_stopping_patience: 10
  monitor_metric: f1_macro
  gradient_clip: 1.0

  finetune_lr: 0.0001
  finetune_epochs: 15
  finetune_batch_size: 64
  finetune_patience: 5

  l2sp:
    enabled: false
    lambda: 0.001
    exclude_patterns: []

  consistency:
    enabled: true
    views: 2
    supervised_on_both_views: true
    loss_type: mse_probs
    temperature: 1.0
    loss_weight: 1.0

  domain_alignment:
    enabled: false 
    weight: 0.5
  
  dann:
    enabled: true
    weight: 0.5
    lambda: 1.0 

multitask:
  auxiliary_shared_head:
    enabled: false
    classes: [0, 2, 3, 5, 6]
    dropout: 0.0
    loss_weight: 0.1
    clinical_blend: 0.2
