# =============================================================================
# configs/training/base.yaml
# Shared defaults. Model-specific configs override these.
# =============================================================================

training:
  max_epochs: 100
  batch_size: 128
  num_workers: 2

  optimizer: adamw
  lr: 0.0001
  weight_decay: 0.0005  

  loss: cross_entropy
  loss_kwargs: {}
  class_weights:
    enabled: true
    source: train

  scheduler: warmup_cosine
  scheduler_cfg:
    warmup_epochs: 5
    total_epochs: 100
    eta_min: 0.000001

  early_stopping_patience: 10
  monitor_metric: f1_macro
  gradient_clip: 1.0

  finetune_lr: 0.00003
  finetune_epochs: 15
  finetune_batch_size: 64
  finetune_patience: 5

  l2sp:
    enabled: false
    lambda: 0.001
    exclude_patterns: []

  consistency:
    enabled: false
    loss_weight: 0.5
    views: 2

  target_supervised:
    enabled: true
    weight: 1.0
  
  dann:
    enabled: false
    weight: 0.05
  
  coral:
    enabled: false
    weight: 0.05
  
  freeze_bn: false

multitask:
  auxiliary_shared_head:
    enabled: false
    classes: [0, 2, 3, 5, 6]
    dropout: 0.0
    loss_weight: 0.1
    clinical_blend: 0.2
